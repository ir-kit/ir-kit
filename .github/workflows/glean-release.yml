name: Release Glean

on:
  push:
    tags: ["glean-v*"]
  workflow_dispatch:

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace deps of glean
        run: pnpm turbo run build --filter "@ahmedrowaihi/glean^..."

      - name: Zip extension
        run: pnpm --filter @ahmedrowaihi/glean zip

      - name: Locate artifacts
        id: artifacts
        run: |
          set -euo pipefail
          chrome_zip=$(ls apps/glean/.output/*-chrome.zip 2>/dev/null | head -n1 || true)
          firefox_zip=$(ls apps/glean/.output/*-firefox.zip 2>/dev/null | head -n1 || true)
          [ -n "$chrome_zip" ] || { echo "no chrome zip produced" >&2; exit 1; }
          {
            echo "chrome=$chrome_zip"
            echo "firefox=$firefox_zip"
          } >> "$GITHUB_OUTPUT"

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHROME_ZIP: ${{ steps.artifacts.outputs.chrome }}
          FIREFOX_ZIP: ${{ steps.artifacts.outputs.firefox }}
        run: |
          set -euo pipefail
          assets=("$CHROME_ZIP")
          [ -n "$FIREFOX_ZIP" ] && assets+=("$FIREFOX_ZIP")
          gh release create "$GITHUB_REF_NAME" \
            --generate-notes \
            "${assets[@]}"
