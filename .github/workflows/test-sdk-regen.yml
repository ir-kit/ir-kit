name: Test sdk-regen action

on:
  push:
    branches: [main]
    paths:
      - 'actions/sdk-regen/**'
      - '.github/workflows/test-sdk-regen.yml'
      - 'packages/openapi/core/**'
      - 'packages/openapi/tools/**'
      - 'packages/openapi/go/**'
      - 'packages/openapi/kotlin/**'
      - 'packages/openapi/swift/**'
      - 'packages/openapi/typescript/**'
      - 'packages/shared/codegen-core/**'
  pull_request:
    branches: [main]
    paths:
      - 'actions/sdk-regen/**'
      - '.github/workflows/test-sdk-regen.yml'
      - 'packages/openapi/core/**'
      - 'packages/openapi/tools/**'
      - 'packages/openapi/go/**'
      - 'packages/openapi/kotlin/**'
      - 'packages/openapi/swift/**'
      - 'packages/openapi/typescript/**'
      - 'packages/shared/codegen-core/**'

# Self-test: pack the first-party generator packages from the working tree
# and invoke the action against them via its `tarball-dir` input. This
# validates the proposed action + package changes together rather than
# whatever's already published on npm. For each target, asserts the action
# regen produces a diff and that the per-target signature file landed.

permissions: {}

jobs:
  pack:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build first-party packages
        run: pnpm turbo run build --filter='@ir-kit/codegen-core' --filter='@ir-kit/openapi-core' --filter='@ir-kit/openapi-tools' --filter='@ir-kit/openapi-go' --filter='@ir-kit/openapi-kotlin' --filter='@ir-kit/openapi-swift' --filter='@ir-kit/openapi-typescript'

      - name: Pack tarballs
        run: |
          set -e
          mkdir -p tarballs
          for pkg in \
            packages/shared/codegen-core \
            packages/openapi/core \
            packages/openapi/tools \
            packages/openapi/go \
            packages/openapi/kotlin \
            packages/openapi/swift \
            packages/openapi/typescript; do
            (cd "$pkg" && pnpm pack --pack-destination "$GITHUB_WORKSPACE/tarballs")
          done
          ls -la tarballs

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sdk-regen-tarballs
          path: tarballs/*.tgz
          retention-days: 1

  regen:
    needs: pack
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: go
            output: tmp-sdk/go
            sentinel: pet.go
            manifest: github.com/example/sdk
            manifest-sentinel: go.mod
          - target: kotlin
            output: tmp-sdk/kotlin
            sentinel: com/example/api/api/PetApi.kt
            manifest: 'true'
            manifest-sentinel: build.gradle.kts
          - target: swift
            output: tmp-sdk/swift
            sentinel: API/PetAPI.swift
            manifest: TestSDK
            manifest-sentinel: Package.swift
          # TypeScript target delegates to @hey-api/openapi-ts; manifest is
          # a no-op (hey-api owns its own output structure), so we leave
          # `manifest` empty and skip the manifest-sentinel assertion below.
          - target: typescript
            output: tmp-sdk/typescript
            sentinel: sdk.gen.ts
            manifest: ''
            manifest-sentinel: ''
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: sdk-regen-tarballs
          path: tarballs

      - name: Run sdk-regen (with manifest)
        id: regen
        uses: ./actions/sdk-regen
        with:
          target: ${{ matrix.target }}
          input: fixtures/petstore.yaml
          output: ${{ matrix.output }}
          manifest: ${{ matrix.manifest }}
          commit-strategy: none
          tarball-dir: tarballs

      - name: Assert outputs
        shell: bash
        env:
          OUTPUT: ${{ matrix.output }}
          SENTINEL: ${{ matrix.sentinel }}
          MANIFEST_SENTINEL: ${{ matrix.manifest-sentinel }}
          CHANGED: ${{ steps.regen.outputs.changed }}
          FILES_CHANGED: ${{ steps.regen.outputs.files-changed }}
        run: |
          set -e
          if [ "$CHANGED" != "true" ]; then
            echo "::error::expected outputs.changed=true (action ran in clean tree); got '$CHANGED'"
            exit 1
          fi
          if [ "$FILES_CHANGED" -lt 1 ]; then
            echo "::error::expected outputs.files-changed >= 1; got '$FILES_CHANGED'"
            exit 1
          fi
          if [ ! -f "$OUTPUT/$SENTINEL" ]; then
            echo "::error::SDK sentinel file missing: $OUTPUT/$SENTINEL"
            ls -la "$OUTPUT" || true
            exit 1
          fi
          if [ -n "$MANIFEST_SENTINEL" ] && [ ! -f "$OUTPUT/$MANIFEST_SENTINEL" ]; then
            echo "::error::manifest sentinel file missing: $OUTPUT/$MANIFEST_SENTINEL"
            ls -la "$OUTPUT" || true
            exit 1
          fi
          if [ -n "$MANIFEST_SENTINEL" ]; then
            echo "✓ ${{ matrix.target }} regen produced $FILES_CHANGED file(s); sentinels $SENTINEL + $MANIFEST_SENTINEL present"
          else
            echo "✓ ${{ matrix.target }} regen produced $FILES_CHANGED file(s); sentinel $SENTINEL present (no manifest expected)"
          fi
