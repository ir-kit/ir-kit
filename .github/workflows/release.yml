name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          title: "chore: version packages"
          commit: "chore: version packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Backfill GitHub Releases for every package published in this run.
      # `changesets/action` only creates a release for packages explicitly
      # listed in a consumed changeset's frontmatter — transitive patch
      # bumps (via `updateInternalDependencies: patch`) get a tag pushed
      # but no GH release. This step iterates `publishedPackages` (which
      # IS complete) and creates a release per package using its
      # CHANGELOG.md entry as the body. `gh release create` is a no-op
      # when the release already exists.
      - name: Backfill GH releases for transitive bumps
        if: steps.changesets.outputs.published == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISHED: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          set -e
          echo "$PUBLISHED" | jq -r '.[] | "\(.name) \(.version)"' | while read -r name version; do
            tag="${name}@${version}"
            if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              echo "::notice::release exists, skipping: $tag"
              continue
            fi
            # Find the package dir + CHANGELOG.md
            dir=$(find packages -name "package.json" -not -path "*/node_modules/*" -exec sh -c 'n=$(jq -r .name "$1") && [ "$n" = "'"$name"'" ] && dirname "$1"' _ {} \; 2>/dev/null | head -1)
            notes="Auto-published at ${version}."
            if [ -n "$dir" ] && [ -f "$dir/CHANGELOG.md" ]; then
              slice=$(awk -v v="$version" '/^## / { if (found) exit; if ($2 == v) { found=1; next } } found { print }' "$dir/CHANGELOG.md")
              [ -n "$slice" ] && notes="$slice"
            fi
            echo "::notice::creating release: $tag"
            gh release create "$tag" --repo "$GITHUB_REPOSITORY" --title "$tag" --notes "$notes"
          done
