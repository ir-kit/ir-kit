name: 'Regenerate AsyncAPI TypeScript SDK'
description: 'Regenerate a TypeScript event SDK from an AsyncAPI 3.0 spec — drop-in for keeping a committed SDK in sync with its source. Powered by @ir-kit/asyncapi-typescript.'
author: 'Ahmed Rowaihi'
branding:
  icon: 'code'
  color: 'blue'

inputs:
  input:
    description: 'Path or URL to the AsyncAPI 3.0 spec. Resolved relative to the repo root for paths.'
    required: true
  output:
    description: 'Directory the generated SDK is written to (created if missing).'
    required: true
  plugins:
    description: 'Comma-separated list of plugins to enable. Order is preserved; dependencies resolve automatically. Available: `typescript`, `events`, `event-map`, `dispatch`, `amqplib`, `index`. Default: all.'
    required: false
    default: 'typescript,events,event-map,dispatch,amqplib,index'
  generator-version:
    description: 'Pinned semver of `@ir-kit/asyncapi-typescript` to install. Defaults to `latest`.'
    required: false
    default: 'latest'
  tarball-dir:
    description: 'Internal: directory containing pre-packed `.tgz` tarballs of asyncapi-typescript / asyncapi-core / codegen-core. When set, the action installs from those tarballs instead of npm — used by the in-repo self-test workflow to validate proposed changes against their own packed output. End users should leave this unset.'
    required: false
    default: ''
  commit-strategy:
    description: '`pull-request` (open a PR via peter-evans/create-pull-request, default), `commit-back` (push directly to the triggering branch — requires `contents: write`), or `none` (regen and exit; following workflow steps own the diff).'
    required: false
    default: 'pull-request'
  commit-message:
    description: 'Commit message used by both `commit-back` and `pull-request` strategies.'
    required: false
    default: 'chore: regenerate AsyncAPI SDK'
  pr-title:
    description: 'PR title (only used when `commit-strategy: pull-request`).'
    required: false
    default: 'chore: regenerate AsyncAPI SDK'
  pr-branch:
    description: 'Branch name for the regen PR (only used when `commit-strategy: pull-request`).'
    required: false
    default: 'asyncapi-regen'
  token:
    description: 'GitHub token used for opening the PR (only `pull-request`). Defaults to `github.token`.'
    required: false
    default: ''

outputs:
  changed:
    description: '`true` when the regen produced a diff in the output directory.'
    value: ${{ steps.diff.outputs.changed }}
  files-changed:
    description: 'Number of files added / modified / deleted under the output directory.'
    value: ${{ steps.diff.outputs.files-changed }}

runs:
  using: 'composite'
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install generator
      id: install
      shell: bash
      env:
        VERSION: ${{ inputs.generator-version }}
        TARBALL_DIR: ${{ inputs.tarball-dir }}
      run: |
        set -e
        WORKDIR="${RUNNER_TEMP}/asyncapi-regen"
        mkdir -p "$WORKDIR"
        cd "$WORKDIR"
        echo '{"private":true,"type":"module"}' > package.json
        if [ -n "$TARBALL_DIR" ]; then
          # Resolve relative to GITHUB_WORKSPACE so callers can pass a repo-relative path
          if [ -d "$GITHUB_WORKSPACE/$TARBALL_DIR" ]; then
            ABS_TARBALL_DIR="$GITHUB_WORKSPACE/$TARBALL_DIR"
          else
            ABS_TARBALL_DIR="$TARBALL_DIR"
          fi
          tarballs=("$ABS_TARBALL_DIR"/*.tgz)
          if [ ! -e "${tarballs[0]}" ]; then
            echo "::error::tarball-dir is set but no .tgz found under $ABS_TARBALL_DIR"
            exit 1
          fi
          echo "::notice::asyncapi-regen — installing from local tarballs in $ABS_TARBALL_DIR"
          npm install --silent --no-audit --no-fund \
            "${tarballs[@]}" \
            "@asyncapi/modelina" \
            "@asyncapi/parser" \
            "@hey-api/codegen-core" \
            "amqplib" \
            "typescript"
        else
          npm install --silent --no-audit --no-fund \
            "@ir-kit/asyncapi-typescript@${VERSION}" \
            "@ir-kit/asyncapi-core" \
            "@ir-kit/codegen-core" \
            "@asyncapi/modelina" \
            "@asyncapi/parser" \
            "@hey-api/codegen-core" \
            "amqplib" \
            "typescript"
        fi
        echo "workdir=$WORKDIR" >> "$GITHUB_OUTPUT"

    - name: Generate SDK
      shell: bash
      env:
        WORKDIR: ${{ steps.install.outputs.workdir }}
        SPEC: ${{ inputs.input }}
        OUTPUT: ${{ inputs.output }}
        PLUGINS: ${{ inputs.plugins }}
        GITHUB_ACTION_PATH: ${{ github.action_path }}
      run: node "$GITHUB_ACTION_PATH/regen.mjs"

    - name: Detect diff
      id: diff
      shell: bash
      env:
        OUTPUT: ${{ inputs.output }}
      run: |
        files_changed=$(git status --porcelain -- "$OUTPUT" | wc -l | tr -d '[:space:]')
        if [ "$files_changed" -gt 0 ]; then
          echo "changed=true" >> "$GITHUB_OUTPUT"
        else
          echo "changed=false" >> "$GITHUB_OUTPUT"
        fi
        echo "files-changed=$files_changed" >> "$GITHUB_OUTPUT"
        echo "::notice::asyncapi-regen — $files_changed file(s) changed under $OUTPUT"

    - name: Resolve placeholders
      id: vars
      if: steps.diff.outputs.changed == 'true' && inputs.commit-strategy != 'none'
      shell: bash
      env:
        PR_TITLE: ${{ inputs.pr-title }}
        PR_BRANCH: ${{ inputs.pr-branch }}
        COMMIT_MESSAGE: ${{ inputs.commit-message }}
      run: |
        echo "pr-title=${PR_TITLE}" >> "$GITHUB_OUTPUT"
        echo "pr-branch=${PR_BRANCH}" >> "$GITHUB_OUTPUT"
        echo "commit-message=${COMMIT_MESSAGE}" >> "$GITHUB_OUTPUT"

    - name: Commit back to triggering branch
      if: inputs.commit-strategy == 'commit-back' && steps.diff.outputs.changed == 'true'
      shell: bash
      env:
        OUTPUT: ${{ inputs.output }}
        COMMIT_MESSAGE: ${{ steps.vars.outputs.commit-message }}
      run: |
        set -e
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add -A -- "$OUTPUT"
        git commit -m "$COMMIT_MESSAGE"
        git push

    - name: Open PR with regen
      if: inputs.commit-strategy == 'pull-request' && steps.diff.outputs.changed == 'true'
      uses: peter-evans/create-pull-request@v7
      with:
        token: ${{ inputs.token != '' && inputs.token || github.token }}
        commit-message: ${{ steps.vars.outputs.commit-message }}
        title: ${{ steps.vars.outputs.pr-title }}
        branch: ${{ steps.vars.outputs.pr-branch }}
        delete-branch: true
        body: |
          Auto-regenerated AsyncAPI TypeScript SDK from `${{ inputs.input }}` via [`ir-kit/ir-kit/actions/asyncapi-regen`](https://github.com/ir-kit/ir-kit/tree/main/actions/asyncapi-regen).

          Plugins enabled: `${{ inputs.plugins }}`
          ${{ steps.diff.outputs.files-changed }} file(s) changed under `${{ inputs.output }}`.
