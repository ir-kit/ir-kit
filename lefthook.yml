pre-commit:
  jobs:
    - name: sync-readme
      glob: "packages/**/package.json"
      run: pnpm sync:readme && git add README.md
    - name: format
      glob: "*.{ts,tsx,js,jsx,json,jsonc,md,yml,yaml,css}"
      exclude:
        - "examples/**/sdk/**"
        - "examples/**/generated/**"
      run: pnpm exec biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true

pre-push:
  jobs:
    - name: typecheck
      run: pnpm typecheck
    - name: format-check
      run: pnpm format:check
    - name: deps-check
      run: pnpm deps:check
